name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          cmake \
          clang \
          libclang-dev \
          libpipewire-0.3-dev \
          qt6-base-dev \
          qt6-declarative-dev \
          libqt6network6 \
          liblilv-dev \
          lv2-dev \
          libx11-dev \
          libdbus-1-dev \
          libsuil-dev
    - name: Build
      run: cargo build --verbose --workspace
    - name: Run tests
      run: cargo test --verbose --workspace
